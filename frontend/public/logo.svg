<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Circular arc (blue to purple gradient) -->
  <defs>
    <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Circle arc -->
  <path d="M30 5 A25 25 0 1 1 12 45" stroke="url(#arcGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Person icon (i shape) -->
  <circle cx="30" cy="18" r="4" fill="#1e1b4b"/>
  <rect x="27" y="24" width="6" height="18" rx="3" fill="#1e1b4b"/>
  <!-- Play triangle -->
  <polygon points="48,30 55,35 48,40" fill="#7c3aed"/>
  <!-- Text: INDIFFERENT -->
  <text x="65" y="35" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1e1b4b" letter-spacing="1">INDIFFERENT</text>
  <!-- Tagline -->
  <text x="65" y="50" font-family="Inter, sans-serif" font-size="7" fill="#7c3aed">AI-Powered Video Generation</text>
</svg>
