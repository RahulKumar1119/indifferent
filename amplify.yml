version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd frontend
            - npm ci
            - |
              cat > src/environments/environment.production.ts << 'EOF'
              export const environment = {
                production: true,
                apiUrl: 'https://api.indifferent.fun',
                googleClientId: '542018054302-hve0b3gf02gsvq9fojn0333o3007t33n.apps.googleusercontent.com',
                googleRedirectUri: 'https://indifferent.fun/auth/callback',
              };
              EOF
        build:
          commands:
            - npx ng build --configuration production
      artifacts:
        baseDirectory: frontend/dist/frontend/browser
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
    appRoot: .
